<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Настя 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
}

/* Фон-интерьер */
.hero {
    background: url("https://images.unsplash.com/photo-1505691938895-1758d7feb511") center/cover no-repeat;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    backdrop-filter: brightness(0.7);
}

h1 {
    font-size: 48px;
    margin: 0;
}

p {
    font-size: 20px;
}

/* Кнопка */
.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 14px 28px;
    background: #ff4d6d;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

.btn:hover {
    background: #e63956;
    transform: scale(1.05);
}

/* Галерея */
.gallery {
    background: #fff;
    padding: 40px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.gallery img {
    width: 250px;
    border-radius: 15px;
}

</style>
</head>

<body>

<div class="hero">
    <h1>Настя — самая прекрасная 💖</h1>
    <p>Она невероятная, красивая и лучшая ✨</p>

    <a class="btn" href="https://www.instagram.com/blazinskaianastea?igsh=MXkwcGZpeXpoOHludQ==" target="_blank">
        Перейти в Instagram
    </a>
</div>

<div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
</div>

</body>
</html>
